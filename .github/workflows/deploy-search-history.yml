name: Deploy Search History

on:
  push:
    branches: [main]
    paths:
      - 'services/search-history/**'
      - 'helm/search-history/**'

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: search-history

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd services/search-history && npm ci

      - name: Run tests
        run: cd services/search-history && npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get commit hash
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          cd services/search-history
          docker build -t ${{ secrets.ECR_SEARCH_HISTORY_URL }}:$TAG .

      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_SEARCH_HISTORY_URL }}:$TAG

      - name: Update Helm values
        run: |
          sed -i "s/tag: .*/tag: $TAG/" helm/search-history/values-dev.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/search-history/values-dev.yaml
          git diff --staged --quiet || git commit -m "deploy: search-history $TAG"
          git push
