name: Deploy Weather API

# WHEN does this pipeline run?
on:
  push:
    branches: [main]          # only on merge to main
    paths:
      - 'services/weather-api/**'   # only when weather-api code changes
      - 'helm/weather-api/**'       # or when its helm chart changes

env:
  AWS_REGION: us-east-1
  SERVICE_NAME: weather-api

jobs:

  # ===== JOB 1: RUN TESTS =====
  test:
    runs-on: ubuntu-latest
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install dependencies
        run: cd services/weather-api && npm ci

      # Run tests
      - name: Run tests
        run: cd services/weather-api && npm test
        # If this fails → whole pipeline stops
        # Nothing gets built or deployed


  # ===== JOB 2: BUILD AND PUSH =====
  build-and-push:
    needs: test               # only runs if tests pass
    runs-on: ubuntu-latest
    steps:
      # Check out the code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          # We need a Personal Access Token (not the default token)
          # because the pipeline needs to push a commit back to the repo
          # The default GITHUB_TOKEN can't trigger new workflows

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
        # These secrets are stored in GitHub repo settings
        # Settings → Secrets and variables → Actions → New repository secret

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # This logs Docker into ECR so it can push images

      # Get the short commit hash for tagging
      - name: Get commit hash
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        # Takes something like a1b2c3d4e5f6g7h8
        # Shortens it to a1b2c3d
        # This becomes the image tag

      # Build the Docker image
      - name: Build Docker image
        run: |
          cd services/weather-api
          docker build -t ${{ secrets.ECR_WEATHER_API_URL }}:$TAG .
        # Runs the multi-stage Dockerfile
        # Tags the image with the commit hash

      # Push to ECR
      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_WEATHER_API_URL }}:$TAG
        # Uploads the image to ECR
        # Now Kubernetes can pull it

      # Update the Helm values file with the new image tag
      - name: Update Helm values
        run: |
          sed -i "s/tag: .*/tag: $TAG/" helm/weather-api/values-dev.yaml
          # Changes: tag: old789x
          # To:      tag: a1b2c3d

      # Commit and push the change
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/weather-api/values-dev.yaml
          git diff --staged --quiet || git commit -m "deploy: weather-api $TAG"
          git push
          # git diff --staged --quiet ||
          # This means: "only commit if there's actually a change"
          # Prevents empty commits

          # After this push, ArgoCD sees the new tag
          # and deploys the new version automatically
