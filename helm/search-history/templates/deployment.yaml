apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-history
  namespace: {{ .Values.namespace }}
  labels:
    app: search-history
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: search-history
  template:
    metadata:
      labels:
        app: search-history
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      serviceAccountName: search-history
      containers:
        - name: search-history
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          env:
            - name: DYNAMODB_TABLE
              value: {{ .Values.env.DYNAMODB_TABLE }}
            - name: AWS_REGION
              value: {{ .Values.env.AWS_REGION }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
